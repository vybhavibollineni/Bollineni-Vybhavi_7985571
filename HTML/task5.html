<h2>Event Registration Form</h2>
<form onsubmit="showMessage(); return false;">
    <label>Name:</label>
    <input type="text"
           placeholder="Enter your name"
           required
           autofocus>
    <label>Email:</label>
    <input type="email"
           placeholder="Enter your email"
           required>
    <label>Event Date:</label>
    <input type="date"
           required>
    <label>Event Type:</label>
    <select required>
        <option value="">
            Select Event
        </option>

        <option>
            Music Festival
        </option>

        <option>
            Games Tournament
        </option>

        <option>
            Dance Program
        </option>
        <option>
            Other Culturals
        </option>
    </select>
    <label>Message:</label>
    <textarea placeholder="Enter your message">
    </textarea>
    <br>
    <button type="submit">
        Register
    </button>
    <br><br>
    <output id="result"></output>
</form>
<style>
    form {

        background-color: lightgray;
        padding: 20px;
        width: 400px;
    }
    input,
    select,
    textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 10px;
    }
    button {
        background-color: blue;
        color: white;
        padding: 10px;
        border: none;
    }
</style>
<script>
    function showMessage() {

        document.getElementById("result").innerHTML =

            "Registration Submitted Successfully!";
    }
</script>
